name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      tag: ${{ steps.versions.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and synced versions
        id: versions
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_FROM_TAG="${TAG#v}"

          if [ "$VERSION_FROM_TAG" = "$TAG" ]; then
            echo "Tag must start with 'v' (example: v0.2.0). Got: $TAG"
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          echo "Tag version:     $VERSION_FROM_TAG"
          echo "package.json:    $PACKAGE_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"

          if [ "$VERSION_FROM_TAG" != "$PACKAGE_VERSION" ] || [ "$VERSION_FROM_TAG" != "$TAURI_VERSION" ]; then
            echo "Version mismatch: tag/package/tauri must be identical."
            exit 1
          fi

          echo "version=$VERSION_FROM_TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build installers (${{ matrix.os }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Import Apple cert (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

      - name: Configure Apple notarization (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_PASSWORD_SECRET" ] && [ ${#APPLE_TEAM_ID_SECRET} -ge 3 ]; then
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
            echo "Apple notarization enabled."
          else
            echo "Apple notarization disabled: APPLE_* secrets are missing or invalid."
          fi

      - name: Build Tauri bundles
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}

      - name: Upload bundle outputs
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: dist
          merge-multiple: true

      - name: Collect release files
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          candidates=(
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.sig
            dist/**/latest*.json
          )

          assets=()
          for file in "${candidates[@]}"; do
            [ -f "$file" ] || continue
            assets+=("$file")
          done

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found under dist/"
            exit 1
          fi

          printf "%s\n" "${assets[@]}" | sort -u > assets.txt
          sha256sum $(cat assets.txt) > SHA256SUMS.txt
          echo "SHA256SUMS.txt" >> assets.txt

          echo "count=$(wc -l < assets.txt)" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.preflight.outputs.tag }}"
          TITLE="Tanym ${TAG}"

          mapfile -t FILES < assets.txt

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" \
              --title "$TITLE" \
              --generate-notes
          fi
